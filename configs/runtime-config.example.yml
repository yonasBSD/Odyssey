hub_url: http://127.0.0.1:8473
bind_addr: 127.0.0.1:8472
worker_count: 4
queue_capacity: 128

bundles:
  "hello-world@latest":
    agents:
      "hello-world":
        model: gpt-5.4
        model_provider: openai
        model_config:
          reasoning_effort: high
        sandbox:
          mode: workspace_write
          permissions:
            filesystem:
              mounts:
                read:
                  - "."
                  - "/home/vishwak/Documents"
                write:
                  # Host mount paths must already exist before session startup.
                  - "/tmp/odyssey-out"
          env:
            OPENAI_API_KEY: OPENAI_API_KEY
            GITHUB_TOKEN: GITHUB_TOKEN
          system_tools:
            - git
            - cargo
